<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PetCare Store | Cart</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .payment-box{
            display:none;
            margin-top:20px;
            padding:20px;
            background:#f5f5f5;
            border-radius:10px;
        }

        .payment-option{
            margin:10px 0;
            padding:12px;
            background:white;
            border-radius:8px;
            cursor:pointer;
            border:1px solid #ddd;
        }

        .payment-option:hover{
            background:#e8f7ff;
        }

        .confirm-btn{
            margin-top:15px;
            padding:10px 20px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .confirm-btn:hover{
            background:#218838;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">🐾 PetCare Store</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart</a>
    </nav>
</header>

<section class="cart-section">

    <h2>Shopping Cart</h2>

    <div class="cart-container">
        <!-- Cart items -->
    </div>

    <div class="cart-total">
        <h3>Total: $0</h3>

        <button class="checkout-btn" onclick="showPayment()">
            Proceed to Checkout
        </button>
    </div>

<!-- PAYMENT METHODS -->
<div class="payment-box" id="paymentBox">

    <h2>Select Payment Method</h2>

    <form id="paymentForm">

        <div class="payment-option">
            <input type="radio" name="payment" id="card" value="Card">
            <label for="card">💳 Credit / Debit Card</label>
        </div>

        <div class="payment-option">
            <input type="radio" name="payment" id="upi" value="UPI">
            <label for="upi">📱 UPI Payment</label>
        </div>

        <div class="payment-option">
            <input type="radio" name="payment" id="banking" value="Banking">
            <label for="banking">🏦 Net Banking</label>
        </div>

        <div class="payment-option">
            <input type="radio" name="payment" id="cod" value="COD">
            <label for="cod">💵 Cash on Delivery</label>
        </div>

        <button type="button" class="confirm-btn" onclick="placeOrder()">
            Confirm Order
        </button>

    </form>

</div>

<script>

function renderCart() {

    const cartContainer = document.querySelector('.cart-container');
    cartContainer.innerHTML = '';

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    if (cart.length === 0) {

        cartContainer.innerHTML = '<p>Your cart is empty.</p>';

        document.querySelector('.cart-total h3').textContent = 'Total: $0';

        return;
    }

    let total = 0;

    cart.forEach((item, index) => {

        const div = document.createElement('div');

        div.className = 'cart-item';

        div.innerHTML = `
            <img src="${item.img}" alt="${item.name}">

            <div class="cart-details">
                <h3>${item.name}</h3>
                <p>Price: $${item.price}</p>
                <p>Quantity: ${item.quantity}</p>
            </div>

            <button class="remove-btn" onclick="removeItem(${index})">
                Remove
            </button>
        `;

        cartContainer.appendChild(div);

        total += item.price * item.quantity;
    });

    document.querySelector('.cart-total h3').textContent =
        'Total: $' + total;
}

function removeItem(index) {

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    cart.splice(index, 1);

    localStorage.setItem('cart', JSON.stringify(cart));

    renderCart();
}

function showPayment() {

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }

    document.getElementById('paymentBox').style.display = 'block';
}

function placeOrder() {

    alert('✅ Order placed successfully! 🐾');

    localStorage.removeItem('cart');

    renderCart();

    setTimeout(() => {

        window.location.href = 'index.html';

    }, 1500);
}

document.addEventListener('DOMContentLoaded', renderCart);

</script>

</section>

<footer>
    <p>© 2026 PetCare Store | All Rights Reserved</p>
</footer>

</body>
</html>
