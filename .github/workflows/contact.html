<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PetCare Store | Contact</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .contact-section{
            width: 50%;
            margin: auto;
            padding: 40px;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, textarea{
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        textarea{
            height: 120px;
            resize: none;
        }

        button{
            padding: 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background: #ff4d4d;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">🐾 PetCare Store</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart</a>
    </nav>
</header>

<section class="contact-section">

    <h2>Contact / Order Form</h2>

    <form onsubmit="sendMail(event)">

        <input type="text"
               id="query"
               placeholder="Any Queries"
               required>

        <input type="text"
               id="name"
               placeholder="Full Name"
               required>

        <input type="email"
               id="email"
               placeholder="Email Address"
               required>

        <textarea id="message"
                  placeholder="Your Message"
                  required></textarea>

        <button type="submit">Submit</button>

    </form>

</section>

<footer>
    <p>© 2026 PetCare Store | All Rights Reserved</p>
</footer>

<script>

function sendMail(event){

    event.preventDefault();

    let query = document.getElementById("query").value;
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;

    let subject = "PetCare Store Contact Form";

    let body =
        "Query: " + query + "%0D%0A" +
        "Name: " + name + "%0D%0A" +
        "Email: " + email + "%0D%0A%0D%0A" +
        "Message:%0D%0A" + message;

    window.location.href =
        "mailto:yourgmail@gmail.com?subject=" +
        subject +
        "&body=" +
        body;
}

</script>

</body>
</html>
