<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <title>Login Page</title>

    <style>

        body{
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#36f0f7,#2752df,#e723c7);
            background-attachment: fixed;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:#f2f2f2;
            width:320px;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h2{
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
            box-sizing:border-box;
        }

        .password-box{
            position:relative;
        }

        .password-box input{
            padding-right:45px;
        }

        .password-box i{
            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            color:black;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:5px;
            background:#4da3f0;
            color:white;
            font-size:18px;
            cursor:pointer;
            margin-top:15px;
        }

        #message{
            margin-top:15px;
            font-size:15px;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <h2>Login</h2>

        <input type="text"
        id="username"
        placeholder="Username">

        <div class="password-box">

            <input type="password"
            id="password"
            placeholder="Enter Password">

            <!-- Eye Icon -->
            <i class="fa-solid fa-eye"
            id="eye"></i>

        </div>

        <button id="loginBtn">Login</button>

        <p id="message"></p>

    </div>

    <script>

        $("#eye").click(function(){

            let password = $("#password");

            if(password.attr("type") === "password"){

                password.attr("type","text");

                $("#eye")
                .removeClass("fa-eye")
                .addClass("fa-eye-slash");
            }

            else{

                password.attr("type","password");

                $("#eye")
                .removeClass("fa-eye-slash")
                .addClass("fa-eye");
            }
        });

        $("#loginBtn").click(function(){

            let username = $("#username").val();
            let password = $("#password").val();

           if(username !== "" && password !== ""){

    $("#message").html("Login Successful");

    window.location.href = "index.html";
}

else{

    $("#message").html("Please Enter Username and Password");
}
        });

    </script>

</body>
</html>
